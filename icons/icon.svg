<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full blue background (fills the entire shape for maskable icons) -->
  <rect width="512" height="512" fill="#2563EB"/>

  <!-- Wrench icon — white, centered in safe zone -->
  <g fill="white">
    <!-- Handle: diagonal pill shape -->
    <rect x="88" y="228" width="288" height="72" rx="36"
          transform="rotate(-45 232 264)"/>

    <!-- Head: large circle -->
    <circle cx="344" cy="168" r="108"/>

    <!-- Inner hollow to make ring -->
    <circle cx="344" cy="168" r="54" fill="#2563EB"/>

    <!-- Jaw opening at top of head -->
    <rect x="294" y="60" width="100" height="90" fill="#2563EB"/>
  </g>
</svg>
