<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded background for browser tab -->
  <rect width="32" height="32" rx="7" fill="#2563EB"/>

  <!-- WRENCH — rotated -45° -->
  <g transform="rotate(-45 16 16)">
    <rect x="4" y="13.5" width="12" height="5" rx="2.5" fill="white"/>
    <circle cx="21.5" cy="16" r="5.5" fill="white"/>
    <circle cx="21.5" cy="16" r="2.8" fill="#2563EB"/>
    <rect x="18.5" y="10.5" width="6" height="4.5" fill="#2563EB"/>
  </g>

  <!-- PENCIL — rotated +45° -->
  <g transform="rotate(45 16 16)">
    <rect x="6" y="13.5" width="14" height="5" rx="1" fill="white"/>
    <polygon points="20,13.5 20,18.5 25,16" fill="white"/>
    <rect x="4.5" y="13" width="2.5" height="6" rx="1" fill="#93C5FD"/>
  </g>
</svg>
